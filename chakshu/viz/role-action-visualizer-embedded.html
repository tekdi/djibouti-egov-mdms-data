<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role-Action Visualizer (Embedded Data)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .controls {
            padding: 20px;
            background: #ecf0f1;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .filter-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            min-width: 200px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-label {
            font-size: 12px;
            color: #7f8c8d;
        }

        .content {
            padding: 20px;
            max-height: 70vh;
            overflow: auto;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #34495e;
            color: white;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        tr:hover {
            background: #e3f2fd;
        }

        .role-cell {
            font-weight: bold;
            color: #2c3e50;
            max-width: 200px;
        }

        .action-cell {
            max-width: 300px;
            word-wrap: break-word;
        }

        .url-cell {
            font-family: monospace;
            font-size: 12px;
            color: #7f8c8d;
            max-width: 400px;
            word-break: break-all;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .error {
            color: #e74c3c;
            background: #fdf2f2;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #e74c3c;
        }

        .info {
            color: #27ae60;
            background: #f0f9f0;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #27ae60;
        }

        .badge {
            background: #3498db;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-left: 5px;
        }

        .service-badge {
            background: #27ae60;
        }

        .disabled-badge {
            background: #95a5a6;
        }

        .view-toggle {
            display: flex;
            gap: 5px;
        }

        .view-btn {
            padding: 6px 12px;
            font-size: 12px;
        }

        .view-btn.active {
            background: #27ae60;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
        }

        .summary-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .summary-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .summary-item {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .file-input-section {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .file-input {
            margin: 5px 10px;
            padding: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Role-Action Visualizer</h1>
            <p>Explore role-action mappings and permissions (Embedded Data Version)</p>
        </div>

        <div class="controls">
            <button class="btn" onclick="loadEmbeddedData()">Load Embedded Data</button>
            <button class="btn" onclick="showFileInput()">Load Custom Files</button>
            <input type="text" class="filter-input" id="role-filter" placeholder="Filter by role..."
                oninput="filterData()">
            <input type="text" class="filter-input" id="action-filter" placeholder="Filter by action..."
                oninput="filterData()">
            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('table')">Table View</button>
                <button class="view-btn" onclick="switchView('summary')">Summary View</button>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="total-roles">0</div>
                    <div class="stat-label">Roles</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-actions">0</div>
                    <div class="stat-label">Actions</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-mappings">0</div>
                    <div class="stat-label">Mappings</div>
                </div>
            </div>
        </div>

        <div class="content">
            <div id="file-input-container" style="display: none;">
                <div class="file-input-section">
                    <h4>Upload JSON Files:</h4>
                    <label>Role Actions: <input type="file" class="file-input" id="roleactions-file"
                            accept=".json"></label>
                    <label>Actions: <input type="file" class="file-input" id="actions-file" accept=".json"></label>
                    <label>Roles: <input type="file" class="file-input" id="roles-file" accept=".json"></label>
                    <button class="btn" onclick="loadFromFiles()">Load from Files</button>
                </div>
            </div>

            <div id="error-container"></div>
            <div id="table-view">
                <div class="loading">Click "Load Embedded Data" to fetch role-action mappings...</div>
            </div>
            <div id="summary-view" style="display: none;">
                <div class="summary-grid">
                    <div class="summary-card">
                        <div class="summary-title">Roles by Action Count</div>
                        <div class="summary-list" id="roles-by-count"></div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-title">Most Used Actions</div>
                        <div class="summary-list" id="actions-by-usage"></div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-title">Service Distribution</div>
                        <div class="summary-list" id="service-distribution"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Embedded JSON data to avoid CORS issues
        const EMBEDDED_DATA = {
            // This will be populated with actual data
            roleActions: [],
            actions: [],
            roles: []
        };

        let rawData = {
            roleActions: [],
            actions: [],
            roles: []
        };
        let processedData = [];
        let filteredData = [];
        let currentView = 'table';

        function loadEmbeddedData() {
            try {
                showLoading();
                clearError();

                // For now, show a message about needing to populate data
                showError('Embedded data needs to be populated. Please use "Load Custom Files" or run via HTTP server.');

            } catch (error) {
                showError('Error loading embedded data: ' + error.message);
                console.error('Load error:', error);
            }
        }

        function showFileInput() {
            document.getElementById('file-input-container').style.display = 'block';
        }

        async function loadFromFiles() {
            try {
                showLoading();
                clearError();

                const roleActionsFile = document.getElementById('roleactions-file').files[0];
                const actionsFile = document.getElementById('actions-file').files[0];
                const rolesFile = document.getElementById('roles-file').files[0];

                if (!roleActionsFile || !actionsFile || !rolesFile) {
                    throw new Error('Please select all three JSON files');
                }

                const [roleActionsText, actionsText, rolesText] = await Promise.all([
                    roleActionsFile.text(),
                    actionsFile.text(),
                    rolesFile.text()
                ]);

                const roleActionsData = JSON.parse(roleActionsText);
                const actionsData = JSON.parse(actionsText);
                const rolesData = JSON.parse(rolesText);

                rawData.roleActions = roleActionsData.roleactions || [];
                rawData.actions = actionsData['actions-test'] || [];
                rawData.roles = rolesData.roles || [];

                processData();
                updateStats();
                renderCurrentView();

                showMessage('Data loaded successfully from files!', 'info');
                document.getElementById('file-input-container').style.display = 'none';

            } catch (error) {
                showError('Error loading files: ' + error.message);
                console.error('Load error:', error);
            }
        }

        function processData() {
            // Create lookup maps for better performance
            const actionMap = new Map();
            rawData.actions.forEach(action => {
                actionMap.set(action.id, action);
            });

            const roleMap = new Map();
            rawData.roles.forEach(role => {
                roleMap.set(role.code, role);
            });

            // Process role-action mappings
            processedData = rawData.roleActions.map(mapping => {
                const action = actionMap.get(mapping.actionid) || {};
                const role = roleMap.get(mapping.rolecode) || {};

                return {
                    roleCode: mapping.rolecode,
                    roleName: role.name || mapping.rolecode,
                    roleDescription: role.description || '',
                    actionId: mapping.actionid,
                    actionName: action.name || 'Unknown Action',
                    actionUrl: action.url || '',
                    actionDisplayName: action.displayName || action.name || '',
                    serviceCode: action.serviceCode || '',
                    enabled: action.enabled !== undefined ? action.enabled : false,
                    tenantId: mapping.tenantId || mapping.tenantid || ''
                };
            });

            filteredData = [...processedData];
        }

        function updateStats() {
            const uniqueRoles = new Set(processedData.map(item => item.roleCode));
            const uniqueActions = new Set(processedData.map(item => item.actionId));

            document.getElementById('total-roles').textContent = uniqueRoles.size;
            document.getElementById('total-actions').textContent = uniqueActions.size;
            document.getElementById('total-mappings').textContent = processedData.length;
        }

        function renderCurrentView() {
            if (currentView === 'table') {
                renderTableView();
            } else {
                renderSummaryView();
            }
        }

        function renderTableView() {
            const container = document.getElementById('table-view');

            if (filteredData.length === 0) {
                container.innerHTML = '<div class="loading">No data to display</div>';
                return;
            }

            let html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Role</th>
                                <th>Action</th>
                                <th>URL</th>
                                <th>Service</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            filteredData.forEach(item => {
                html += `
                    <tr>
                        <td class="role-cell">
                            <strong>${item.roleCode}</strong><br>
                            <small>${item.roleName}</small>
                            ${item.roleDescription ? `<br><em style="color: #7f8c8d;">${item.roleDescription}</em>` : ''}
                        </td>
                        <td class="action-cell">
                            <strong>${item.actionDisplayName || item.actionName}</strong>
                            <span class="badge">${item.actionId}</span><br>
                            <small style="color: #7f8c8d;">${item.actionName}</small>
                        </td>
                        <td class="url-cell">${item.actionUrl}</td>
                        <td>
                            ${item.serviceCode ? `<span class="badge service-badge">${item.serviceCode}</span>` : '-'}
                        </td>
                        <td>
                            <span class="badge ${item.enabled ? '' : 'disabled-badge'}">
                                ${item.enabled ? 'Enabled' : 'Disabled'}
                            </span>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        function renderSummaryView() {
            // Roles by action count
            const roleActionCounts = new Map();
            processedData.forEach(item => {
                const count = roleActionCounts.get(item.roleCode) || 0;
                roleActionCounts.set(item.roleCode, count + 1);
            });

            const sortedRoles = Array.from(roleActionCounts.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 15);

            document.getElementById('roles-by-count').innerHTML = sortedRoles
                .map(([role, count]) => `
                    <div class="summary-item">
                        <span>${role}</span>
                        <span class="badge">${count}</span>
                    </div>
                `).join('');

            // Most used actions
            const actionUsageCounts = new Map();
            processedData.forEach(item => {
                const count = actionUsageCounts.get(item.actionId) || 0;
                actionUsageCounts.set(item.actionId, count + 1);
            });

            const sortedActions = Array.from(actionUsageCounts.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 15);

            document.getElementById('actions-by-usage').innerHTML = sortedActions
                .map(([actionId, count]) => {
                    const action = processedData.find(item => item.actionId == actionId);
                    return `
                        <div class="summary-item">
                            <span>${action ? (action.actionDisplayName || action.actionName) : actionId}</span>
                            <span class="badge">${count}</span>
                        </div>
                    `;
                }).join('');

            // Service distribution
            const serviceCounts = new Map();
            processedData.forEach(item => {
                if (item.serviceCode) {
                    const count = serviceCounts.get(item.serviceCode) || 0;
                    serviceCounts.set(item.serviceCode, count + 1);
                }
            });

            const sortedServices = Array.from(serviceCounts.entries())
                .sort((a, b) => b[1] - a[1]);

            document.getElementById('service-distribution').innerHTML = sortedServices
                .map(([service, count]) => `
                    <div class="summary-item">
                        <span>${service}</span>
                        <span class="badge service-badge">${count}</span>
                    </div>
                `).join('');
        }

        function filterData() {
            const roleFilter = document.getElementById('role-filter').value.toLowerCase();
            const actionFilter = document.getElementById('action-filter').value.toLowerCase();

            filteredData = processedData.filter(item => {
                const roleMatch = !roleFilter ||
                    item.roleCode.toLowerCase().includes(roleFilter) ||
                    item.roleName.toLowerCase().includes(roleFilter);

                const actionMatch = !actionFilter ||
                    item.actionName.toLowerCase().includes(actionFilter) ||
                    item.actionDisplayName.toLowerCase().includes(actionFilter) ||
                    item.actionUrl.toLowerCase().includes(actionFilter);

                return roleMatch && actionMatch;
            });

            renderCurrentView();
        }

        function switchView(view) {
            currentView = view;

            // Update button states
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Show/hide views
            document.getElementById('table-view').style.display = view === 'table' ? 'block' : 'none';
            document.getElementById('summary-view').style.display = view === 'summary' ? 'block' : 'none';

            renderCurrentView();
        }

        function showLoading() {
            document.getElementById('table-view').innerHTML = '<div class="loading">Loading data...</div>';
        }

        function showError(message) {
            document.getElementById('error-container').innerHTML = `<div class="error">${message}</div>`;
        }

        function showMessage(message, type = 'info') {
            const className = type === 'error' ? 'error' : 'info';
            document.getElementById('error-container').innerHTML = `<div class="${className}">${message}</div>`;
            setTimeout(() => {
                document.getElementById('error-container').innerHTML = '';
            }, 3000);
        }

        function clearError() {
            document.getElementById('error-container').innerHTML = '';
        }
    </script>
</body>

</html>
