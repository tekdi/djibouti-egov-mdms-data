                        <button class="search-btn" onclick="searchInEditor()" title="Find (Ctrl+F)">🔍</button>

                    </div>
                </div>
            </div>
            <div class="editor-container">
                <textarea id="workflow-editor"></textarea>
            </div>
            <div class="controls">
                <button class="btn" onclick="loadSampleWorkflow()">Load Sample</button>
                <button class="btn" onclick="loadServiceConfig()">Load Service Config</button>
                <button class="btn" onclick="formatJSON()">Format JSON</button>
                <button class="btn success" onclick="updateDiagram()">Update Diagram</button>
                <input type="file" id="file-input" accept=".json" style="display: none;" onchange="loadFromFile(event)">
                <button class="btn" onclick="document.getElementById('file-input').click()">Load from File</button>
                <label>
                    <input type="checkbox" id="auto-update" checked> Auto-update
                </label>
            </div>
        </div>

        <div class="right-panel">
            <div class="header">
                <div class="tab-container">
                    <button class="tab-btn active" onclick="switchTab('preview')">Preview</button>
                    <button class="tab-btn" onclick="switchTab('code')">Code</button>
                </div>
            </div>
            <div class="diagram-container">
                <div id="error-container"></div>
                <div id="preview-tab" class="tab-content active">
                    <div class="zoom-controls">
                        <button class="zoom-btn" onclick="zoomDiagram(0.8)">−</button>
                        <span id="zoom-level">100%</span>
                        <button class="zoom-btn" onclick="zoomDiagram(1.25)">+</button>
                        <button class="zoom-btn" onclick="resetZoom()">Reset</button>
                    </div>
                    <div id="diagram-container-wrapper">
                        <div id="mermaid-diagram">
                            <div class="loading">Load or paste a workflow JSON to see the diagram...</div>
                        </div>
                    </div>
                </div>
                <div id="code-tab" class="tab-content">
                    <div class="code-header">
                        <span class="code-title">Mermaid Code</span>
                        <div class="code-controls">
                            <button class="btn btn-sm" onclick="updateDiagramFromCode()">Apply Code</button>
                            <button class="btn btn-sm" onclick="regenerateFromJSON()">Regenerate</button>
                            <label>
                                <input type="checkbox" id="auto-apply-code" checked> Auto-apply
                            </label>
                        </div>
                    </div>
                    <div class="code-editor-container">
                        <textarea id="mermaid-code-editor">// Generated Mermaid code will appear here...</textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let editor;
        let mermaidInitialized = false;

        // Initialize Mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                curve: 'basis',
                padding: 20
            }
        });

        // Initialize CodeMirror
        document.addEventListener('DOMContentLoaded', function () {
            editor = CodeMirror.fromTextArea(document.getElementById('workflow-editor'), {
                mode: 'application/json',
                theme: 'default',
                lineNumbers: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                indentUnit: 2,
                tabSize: 2,
                lineWrapping: true
            });

            // Auto-update on change
            editor.on('change', function () {
                if (document.getElementById('auto-update').checked) {
                    debounce(updateDiagram, 1000)();
                }
            });

            // Add mouse wheel zoom support
            setTimeout(() => {
                const diagramWrapper = document.getElementById('diagram-container-wrapper');
                if (diagramWrapper) {
                    diagramWrapper.addEventListener('wheel', function (e) {
                        if (e.ctrlKey || e.metaKey) {
                            e.preventDefault();
                            const factor = e.deltaY < 0 ? 1.1 : 0.9;
                            zoomDiagram(factor);
                        }
                    });
                }
            }, 100);

            // Add keyboard shortcuts
            document.addEventListener('keydown', function (e) {
                if ((e.ctrlKey || e.metaKey) && document.getElementById('preview-tab').classList.contains('active')) {
                    if (e.key === '=' || e.key === '+') {
                        e.preventDefault();
                        zoomDiagram(1.1);
                    } else if (e.key === '-') {
                        e.preventDefault();
                        zoomDiagram(0.9);
                    } else if (e.key === '0') {
                        e.preventDefault();
                        resetZoom();
                    }
                }

                // Global search shortcut
                if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                    e.preventDefault();
                    document.getElementById('search-input').focus();
                    document.getElementById('search-input').select();
                }
            });

            // Setup search input event listeners
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', function (e) {
                if (e.target.value.trim()) {
                    searchInEditor();
                } else {
                    clearSearch();
                }
            });

            searchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        findPrevious();
                    } else {
                        findNext();
                    }
                } else if (e.key === 'Escape') {
                    clearSearch();
                    editor.focus();
                }
            });

            // Setup code editor event listeners
            const codeEditor = document.getElementById('mermaid-code-editor');
            codeEditor.addEventListener('input', function () {
                if (document.getElementById('auto-apply-code').checked) {
                    debounce(updateDiagramFromCode, 1000)();
                }
            });

            loadSampleWorkflow();
        });

        // Debounce function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function formatJSON() {
            try {
                const content = editor.getValue();
                const parsed = JSON.parse(content);
                editor.setValue(JSON.stringify(parsed, null, 2));
                showMessage('JSON formatted successfully!', 'info');
            } catch (e) {
                showError('Invalid JSON: ' + e.message);
            }
        }

        function cleanNodeId(name) {
            // Clean node ID to be Mermaid-safe
            return name.replace(/[^a-zA-Z0-9_]/g, '_').replace(/^_+|_+$/g, '') || 'NODE';
        }

        function workflowToMermaid(workflow) {
            let mermaid = 'flowchart LR\n';
            const states = workflow.states || [];
            const stateMap = {};

            // Extract all unique roles from the workflow
            const allRoles = new Set();
            states.forEach(state => {
                if (state.actions) {
                    state.actions.forEach(action => {
                        if (action.roles) {
                            action.roles.forEach(role => allRoles.add(role));
                        }
                    });
                }
            });

            // Convert to array and sort for consistent ordering
            const rolesList = Array.from(allRoles).sort();

            // Create a mapping of states to their primary role (role that can act on them)
            const stateToRole = {};
            states.forEach(state => {
                const stateName = state.state || 'START';

                // Find the primary role for this state (from its outgoing actions)
                if (state.actions && state.actions.length > 0) {
                    // Use the first role from the first action as primary
                    const primaryRole = state.actions[0].roles ? state.actions[0].roles[0] : 'SYSTEM';
                    stateToRole[stateName] = primaryRole;
                } else {
                    // Terminal states or states without actions
                    stateToRole[stateName] = 'SYSTEM';
                }
            });

            // Create subgraphs for each role (swimlanes)
            rolesList.forEach(role => {
                mermaid += `    subgraph ${cleanNodeId(role)}["${role}"]\n`;

                // Add states that belong to this role
                states.forEach(state => {
                    const stateName = state.state || 'START';
                    const cleanId = cleanNodeId(stateName);
                    stateMap[stateName] = cleanId;

                    if (stateToRole[stateName] === role) {
                        const label = stateName || 'START';
                        mermaid += `        ${cleanId}["${label}"]\n`;
                    }
                });

                mermaid += `    end\n\n`;
            });

            // Add system/terminal states that don't belong to any specific role
            const systemStates = states.filter(state => {
                const stateName = state.state || 'START';
                return stateToRole[stateName] === 'SYSTEM';
            });

            if (systemStates.length > 0) {
                mermaid += `    subgraph SYSTEM["SYSTEM"]\n`;
                systemStates.forEach(state => {
                    const stateName = state.state || 'START';
                    const cleanId = cleanNodeId(stateName);
                    stateMap[stateName] = cleanId;
                    const label = stateName || 'START';
                    mermaid += `        ${cleanId}["${label}"]\n`;
                });
                mermaid += `    end\n\n`;
            }

            // Create connections with actions on the lines
            states.forEach(state => {
                if (state.actions) {
                    state.actions.forEach(action => {
                        const fromState = state.state || 'START';
                        const toState = action.nextState;
                        const fromId = stateMap[fromState];
                        let toId = stateMap[toState];

                        // If target state doesn't exist in our map, create it in SYSTEM
                        if (!toId) {
                            toId = cleanNodeId(toState);
                            stateMap[toState] = toId;
                        }

                        // Create connection with action information (no roles since they're shown in swimlanes)
                        const actionLabel = (action.action || '').replace(/"/g, "'");

                        if (actionLabel) {
                            mermaid += `    ${fromId} -->|"${actionLabel}"| ${toId}\n`;
                        } else {
                            mermaid += `    ${fromId} --> ${toId}\n`;
                        }
                    });
                }
            });

            // Add parallel workflows if they exist
            states.forEach(state => {
                if (state.triggerParallelWorkflows && state.triggerParallelWorkflows.length > 0) {
                    const stateId = stateMap[state.state];
                    state.triggerParallelWorkflows.forEach(workflow => {
                        const workflowId = cleanNodeId(workflow);
                        mermaid += `    ${workflowId}["${workflow}"]\n`;
                        mermaid += `    ${stateId} -.->|"Triggers"| ${workflowId}\n`;
                    });
                }
            });

            // Add styling
            mermaid += '\n';
            mermaid += '    classDef stateBox fill:#e3f2fd,stroke:#1976d2,stroke-width:2px\n';

            // Apply uniform style to all states
            Object.values(stateMap).forEach(stateId => {
                mermaid += `    class ${stateId} stateBox\n`;
            });

            return mermaid;
        }

        function updateDiagram() {
            try {
                clearError();
                const content = editor.getValue().trim();

                if (!content) {
                    document.getElementById('mermaid-diagram').innerHTML =
                        '<div class="loading">Enter workflow JSON to see the diagram...</div>';
                    document.getElementById('mermaid-code-editor').value = '// No workflow data';
                    return;
                }

                const workflow = JSON.parse(content);
                const mermaidCode = workflowToMermaid(workflow);

                // Update the code tab
                document.getElementById('mermaid-code-editor').value = mermaidCode;

                // Clear previous diagram
                document.getElementById('mermaid-diagram').innerHTML = '';

                // Render new diagram
                mermaid.render('workflow-diagram', mermaidCode).then(({ svg }) => {
                    document.getElementById('mermaid-diagram').innerHTML = svg;
                }).catch(error => {
                    showError('Mermaid rendering error: ' + error.message + '\n\nCheck the "Mermaid Code" tab to see the generated code.');
                    console.error('Mermaid error:', error);
                    console.error('Generated Mermaid code:', mermaidCode);
                });

            } catch (e) {
                showError('JSON parsing error: ' + e.message);
            }
        }

        let currentZoom = 1.0;

        function switchTab(tabName) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab and activate button
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        function zoomDiagram(factor) {
            currentZoom *= factor;
            // Limit zoom range
            currentZoom = Math.max(0.1, Math.min(currentZoom, 5.0));

            const diagram = document.getElementById('mermaid-diagram');
            diagram.style.transform = `scale(${currentZoom})`;

            // Update zoom level display
            document.getElementById('zoom-level').textContent = Math.round(currentZoom * 100) + '%';
        }

        function resetZoom() {
            currentZoom = 1.0;
            const diagram = document.getElementById('mermaid-diagram');
            diagram.style.transform = 'scale(1)';
            document.getElementById('zoom-level').textContent = '100%';
        }

        // Search functionality
        let searchState = null;

        function searchInEditor() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) {
                clearSearch();
                return;
            }

            // Clear previous search
            if (searchState) {
                searchState.clear();
            }

            // Create new search state
            searchState = editor.getSearchCursor(query, null, {
                caseFold: false
            });

            // Find and highlight all matches
            const matches = [];
            let match;
            while (match = searchState.findNext()) {
                matches.push({
                    from: searchState.from(),
                    to: searchState.to()
                });

                // Highlight the match
                editor.markText(searchState.from(), searchState.to(), {
                    className: 'CodeMirror-search-match'
                });
            }

            if (matches.length > 0) {
                // Jump to first match
                editor.scrollIntoView(matches[0].from);
                editor.setSelection(matches[0].from, matches[0].to);

                // Update search state for navigation
                searchState = editor.getSearchCursor(query, null, {
                    caseFold: false
                });
                searchState.findNext();
            }

            // Update search input appearance
            const searchInput = document.getElementById('search-input');
            if (matches.length > 0) {
                searchInput.style.backgroundColor = '#d4edda';
                searchInput.title = `${matches.length} matches found`;
            } else {
                searchInput.style.backgroundColor = '#f8d7da';
                searchInput.title = 'No matches found';
            }
        }

        function findNext() {
            if (!searchState) {
                searchInEditor();
                return;
            }

            if (searchState.findNext()) {
                editor.scrollIntoView(searchState.from());
                editor.setSelection(searchState.from(), searchState.to());
            } else {
                // Wrap to beginning
                const query = document.getElementById('search-input').value.trim();
                searchState = editor.getSearchCursor(query, CodeMirror.Pos(0, 0), {
                    caseFold: false
                });
                if (searchState.findNext()) {
                    editor.scrollIntoView(searchState.from());
                    editor.setSelection(searchState.from(), searchState.to());
                }
            }
        }

        function findPrevious() {
            if (!searchState) {
                searchInEditor();
                return;
            }

            if (searchState.findPrevious()) {
                editor.scrollIntoView(searchState.from());
                editor.setSelection(searchState.from(), searchState.to());
            } else {
                // Wrap to end
                const query = document.getElementById('search-input').value.trim();
                searchState = editor.getSearchCursor(query, null, {
                    caseFold: false
                });
                // Find all matches to get to the last one
                let lastMatch = null;
                while (searchState.findNext()) {
                    lastMatch = {
                        from: searchState.from(),
                        to: searchState.to()
                    };
                }
                if (lastMatch) {
                    editor.scrollIntoView(lastMatch.from);
                    editor.setSelection(lastMatch.from, lastMatch.to);
                    searchState = editor.getSearchCursor(query, lastMatch.from, {
                        caseFold: false
                    });
                }
            }
        }

        function clearSearch() {
            // Clear all search highlights
            const marks = editor.getAllMarks();
            marks.forEach(mark => {
                if (mark.className === 'CodeMirror-search-match') {
                    mark.clear();
                }
            });

            // Reset search state
            if (searchState) {
                searchState.clear();
                searchState = null;
            }

            // Reset search input appearance
            const searchInput = document.getElementById('search-input');
            searchInput.style.backgroundColor = '';
            searchInput.title = '';
            searchInput.value = '';

            editor.focus();
        }

        // Code editor functionality
        function updateDiagramFromCode() {
            try {
                clearError();
                const mermaidCode = document.getElementById('mermaid-code-editor').value.trim();

                if (!mermaidCode || mermaidCode === '// No workflow data') {
                    document.getElementById('mermaid-diagram').innerHTML =
                        '<div class="loading">Enter Mermaid code to see the diagram...</div>';
                    return;
                }

                // Clear previous diagram
                document.getElementById('mermaid-diagram').innerHTML = '';

                // Render diagram from code
                mermaid.render('workflow-diagram', mermaidCode).then(({ svg }) => {
                    document.getElementById('mermaid-diagram').innerHTML = svg;
                    showMessage('Diagram updated from code successfully!', 'info');
                }).catch(error => {
                    showError('Mermaid code error: ' + error.message + '\\n\\nPlease check your Mermaid syntax.');
                    console.error('Mermaid error:', error);
                });

            } catch (e) {
                showError('Code processing error: ' + e.message);
            }
        }

        function regenerateFromJSON() {
            try {
                const content = editor.getValue().trim();
                if (!content) {
                    showError('No JSON content to regenerate from');
                    return;
                }

                const workflow = JSON.parse(content);
                const mermaidCode = workflowToMermaid(workflow);

                // Update the code editor
                document.getElementById('mermaid-code-editor').value = mermaidCode;

                // Update diagram if auto-apply is enabled
                if (document.getElementById('auto-apply-code').checked) {
                    updateDiagramFromCode();
                }

                showMessage('Mermaid code regenerated from JSON!', 'info');

            } catch (e) {
                showError('JSON parsing error: ' + e.message);
            }
        }

        function showError(message) {
            const errorContainer = document.getElementById('error-container');
            errorContainer.innerHTML = `<div class="error">${message}</div>`;
        }

        function showMessage(message, type = 'info') {
            const errorContainer = document.getElementById('error-container');
            errorContainer.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => {
                errorContainer.innerHTML = '';
            }, 3000);
        }

        function clearError() {
            document.getElementById('error-container').innerHTML = '';
        }

        function loadServiceConfig() {
            // Try to load the extracted workflow.json file
            fetch('./workflow.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('workflow.json not found. Run the extraction script first.');
                    }
                    return response.json();
                })
                .then(workflow => {
                    editor.setValue(JSON.stringify(workflow, null, 2));
                    updateDiagram();
                    showMessage('Service configuration workflow loaded successfully!', 'info');
                })
                .catch(error => {
                    showError('Error loading service config: ' + error.message);
                });
        }

        function loadFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const content = e.target.result;
                    const json = JSON.parse(content);

                    // Check if this is a service configuration file
                    if (json.ServiceConfiguration && json.ServiceConfiguration.length > 0) {
                        const workflow = json.ServiceConfiguration[0].workflow;
                        if (workflow) {
                            editor.setValue(JSON.stringify(workflow, null, 2));
                            showMessage('Workflow extracted from service configuration!', 'info');
                        } else {
                            showError('No workflow found in service configuration');
                        }
                    } else if (json.states || json.businessService) {
                        // Direct workflow file
                        editor.setValue(JSON.stringify(json, null, 2));
                        showMessage('Workflow file loaded successfully!', 'info');
                    } else {
                        // Generic JSON file
                        editor.setValue(content);
                        showMessage('JSON file loaded. Please ensure it contains a valid workflow.', 'info');
                    }

                    updateDiagram();
                } catch (error) {
                    showError('Invalid JSON file: ' + error.message);
                }
            };
            reader.readAsText(file);
        }
