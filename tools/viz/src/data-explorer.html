<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Files Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/neo.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/yaml/yaml.min.js"></script>
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            margin: 0;
            height: 100%;
            min-height: 100%;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 24px 30px;
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 1px;
            height: 72px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            height: calc(100vh - 72px);
            min-height: 0;
        }

        .sidebar {
            width: 350px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            padding: 20px 0;
            min-height: 0;
        }

        .main {
            flex: 1;
            padding: 0;
            background: #f4f6fa;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .breadcrumbs {
            background: #f8f9fa;
            padding: 12px 30px 8px 30px;
            font-size: 1.1em;
            color: #888;
            border-bottom: 1px solid #e0e0e0;
            user-select: none;
        }

        .breadcrumbs span {
            cursor: pointer;
            color: #3498db;
        }

        .breadcrumbs span:last-child {
            color: #222;
            cursor: default;
        }

        .breadcrumbs .sep {
            color: #bbb;
            margin: 0 6px;
        }

        .tree {
            list-style: none;
            padding-left: 20px;
        }

        .tree li {
            margin: 2px 0;
            cursor: pointer;
            user-select: none;
        }

        .tree .folder {
            font-weight: 600;
            color: #34495e;
        }

        .tree .file {
            color: #2980b9;
            font-family: monospace;
        }

        .tree .toggle {
            margin-right: 6px;
            color: #888;
            cursor: pointer;
        }

        .tree .toggle.open {
            color: #27ae60;
        }

        .tree .toggle.closed {
            color: #e67e22;
        }

        .tree .selected {
            background: #e3f2fd;
            border-radius: 4px;
        }

        .tree .icon-folder {
            color: #f4b400;
            margin-right: 4px;
        }

        .tree .icon-file {
            color: #2196f3;
            margin-right: 4px;
        }

        .file-actions {
            margin-top: 10px;
        }

        .file-actions button {
            margin-right: 10px;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .file-actions button:hover {
            background: #2980b9;
        }

        .cm-container {
            background: #fff;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .cm-header {
            padding: 10px 30px 0 30px;
            border-bottom: none;
            background: #fff;
            font-size: 1.1em;
            color: #34495e;
            display: flex;
            align-items: center;
        }

        .cm-header .file-path {
            font-family: monospace;
            margin-left: 10px;
            color: #888;
            font-size: 0.95em;
        }

        .cm-editor {
            flex: 1;
            min-height: 0;
            padding: 0 30px 30px 30px;
            background: #fff;
        }

        .loading,
        .error,
        .info {
            color: #888;
            padding: 30px;
            text-align: center;
        }

        .error {
            color: #e74c3c;
        }

        .info {
            color: #888;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 180px;
                font-size: 13px;
            }

            .main {
                padding: 0;
            }

            .cm-header,
            .breadcrumbs,
            .cm-editor {
                padding-left: 10px;
                padding-right: 10px;
            }
        }

        /* Ensure CodeMirror fills the available height */
        .CodeMirror {
            height: 100% !important;
            min-height: 0;
        }
    </style>
</head>

<body>
    <div class="header">🗂️ Data Files Explorer
        <button id="toggle-readonly"
            style="float:right; margin-top:8px; font-size:0.6em; padding:6px 16px; border-radius:6px; border:none; background:#3498db; color:white; cursor:pointer;">Read
            Only</button>
    </div>
    <div class="container">
        <div class="sidebar">
            <div id="tree-loading" class="loading">Loading folder tree...</div>
            <div id="recent-section" style="display:none">
                <h4 style="margin:10px 0 5px 20px; color:#888; font-weight:600;">Recently Changed Configs</h4>
                <ul id="recent-list" class="tree"></ul>
            </div>
            <h4 style="margin:10px 0 5px 20px; color:#888; font-weight:600;">All Configs</h4>
            <ul id="tree-root" class="tree" style="display:none"></ul>
        </div>
        <div class="main">
            <div id="breadcrumbs" class="breadcrumbs" style="display:none"></div>
            <div id="file-panel" class="cm-container" style="display:none">
                <div class="cm-header">
                    <span id="file-icon"></span>
                    <span id="file-name"></span>
                    <span class="file-path" id="file-path"></span>
                </div>
                <div class="file-actions" id="file-actions"></div>
                <div class="cm-editor" id="cm-editor"></div>
            </div>
            <div id="file-loading" class="loading" style="display:none">Loading file...</div>
            <div id="file-error" class="error" style="display:none"></div>
            <div id="file-info" class="info" style="display:none"></div>
        </div>
    </div>
    <script>
        // --- Config ---
        const DATA_ROOT = '/data';
        const FILE_EXTS = ['.json', '.yaml', '.yml'];
        // --- Tree Logic ---
        async function fetchDataTree() {
            const res = await fetch('/api-local/data-tree');
            if (!res.ok) throw new Error('Failed to fetch data tree');
            return await res.json();
        }
        async function fetchRecentConfigs() {
            const res = await fetch('/api-local/recently-changed-configs');
            if (!res.ok) return [];
            return await res.json();
        }
        function renderTree(nodes, parentUl) {
            nodes.forEach(node => {
                const li = document.createElement('li');
                li.className = node.type;
                li.dataset.path = node.path;
                if (node.type === 'folder') {
                    const toggle = document.createElement('span');
                    toggle.textContent = '▶';
                    toggle.className = 'toggle closed';
                    toggle.onclick = function (e) {
                        e.stopPropagation();
                        if (toggle.classList.contains('open')) {
                            toggle.classList.remove('open');
                            toggle.classList.add('closed');
                            if (li.querySelector('ul')) li.querySelector('ul').style.display = 'none';
                        } else {
                            toggle.classList.remove('closed');
                            toggle.classList.add('open');
                            if (!li.querySelector('ul')) {
                                const ul = document.createElement('ul');
                                ul.className = 'tree';
                                li.appendChild(ul);
                                renderTree(node.children, ul);
                            } else {
                                li.querySelector('ul').style.display = 'block';
                            }
                        }
                    };
                    const icon = document.createElement('span');
                    icon.textContent = '📁';
                    icon.className = 'icon-folder';
                    li.appendChild(toggle);
                    li.appendChild(icon);
                    li.appendChild(document.createTextNode(' ' + node.name));
                } else {
                    const icon = document.createElement('span');
                    icon.textContent = '📄';
                    icon.className = 'icon-file';
                    li.appendChild(icon);
                    li.appendChild(document.createTextNode(node.name));
                    li.onclick = function (e) {
                        e.stopPropagation();
                        document.querySelectorAll('.tree .selected').forEach(el => el.classList.remove('selected'));
                        li.classList.add('selected');
                        loadFile(node.path, node.name);
                    };
                }
                parentUl.appendChild(li);
            });
        }
        function renderRecentList(files) {
            const ul = document.getElementById('recent-list');
            ul.innerHTML = '';
            if (!files || files.length === 0) {
                const li = document.createElement('li');
                li.className = 'info';
                li.textContent = 'No recent changes found';
                ul.appendChild(li);
                return;
            }
            files.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file';
                li.dataset.path = file.path;
                const icon = document.createElement('span');
                icon.textContent = '📄';
                icon.className = 'icon-file';
                li.appendChild(icon);
                li.appendChild(document.createTextNode(file.name));
                li.onclick = function (e) {
                    e.stopPropagation();
                    document.querySelectorAll('.tree .selected').forEach(el => el.classList.remove('selected'));
                    li.classList.add('selected');
                    loadFile(file.path, file.name);
                };
                ul.appendChild(li);
            });
        }
        async function initTree() {
            const rootUl = document.getElementById('tree-root');
            document.getElementById('tree-loading').style.display = '';
            rootUl.style.display = 'none';
            rootUl.innerHTML = '';
            try {
                const [tree, recent] = await Promise.all([
                    fetchDataTree(),
                    fetchRecentConfigs()
                ]);
                renderTree(tree, rootUl);
                document.getElementById('tree-loading').style.display = 'none';
                rootUl.style.display = '';
                // Always show the section, even if empty
                document.getElementById('recent-section').style.display = '';
                renderRecentList(recent);
            } catch (err) {
                document.getElementById('tree-loading').textContent = 'Failed to load folder tree.';
            }
        }
        // --- File Viewer Logic ---
        let cm = null;
        let isReadOnly = true;
        function getMode(filename) {
            if (filename.endsWith('.json')) return 'application/json';
            if (filename.endsWith('.yaml') || filename.endsWith('.yml')) return 'yaml';
            return null;
        }
        function setBreadcrumbs(path) {
            const bc = document.getElementById('breadcrumbs');
            if (!path) { bc.style.display = 'none'; return; }
            const parts = path.split('/').filter(Boolean);
            let acc = '';
            bc.innerHTML = '';
            parts.forEach((part, idx) => {
                acc += '/' + part;
                const span = document.createElement('span');
                span.textContent = part;
                if (idx < parts.length - 1) {
                    span.onclick = function () {
                        expandToPath(acc + '/');
                    };
                }
                bc.appendChild(span);
                if (idx < parts.length - 1) {
                    const sep = document.createElement('span');
                    sep.textContent = '›';
                    sep.className = 'sep';
                    bc.appendChild(sep);
                }
            });
            bc.style.display = '';
        }
        function expandToPath(path) {
            // Expand folders in the tree to reveal the given path
            const segments = path.split('/').filter(Boolean);
            let currPath = '';
            let found = false;
            let lastLi = null;
            document.querySelectorAll('.tree ul, .tree').forEach(ul => ul.style.display = '');
            document.querySelectorAll('.tree .open').forEach(t => t.classList.remove('open'));
            document.querySelectorAll('.tree .closed').forEach(t => t.classList.add('closed'));
            for (let i = 0; i < segments.length; i++) {
                currPath += '/' + segments[i];
                const folderLi = document.querySelector('.tree li.folder[data-path="' + currPath + '/"]');
                if (folderLi) {
                    const toggle = folderLi.querySelector('.toggle');
                    if (toggle && !toggle.classList.contains('open')) {
                        toggle.classList.remove('closed');
                        toggle.classList.add('open');
                        let ul = folderLi.querySelector('ul');
                        if (!ul) {
                            ul = document.createElement('ul');
                            ul.className = 'tree';
                            folderLi.appendChild(ul);
                        }
                        ul.style.display = '';
                    }
                    lastLi = folderLi;
                } else {
                    // Try to select the file if it's the last segment
                    if (i === segments.length - 1) {
                        const fileLi = document.querySelector('.tree li.file[data-path="' + currPath + '"]');
                        if (fileLi) {
                            fileLi.classList.add('selected');
                            fileLi.scrollIntoView({ block: 'center' });
                        }
                    }
                }
            }
            if (lastLi) lastLi.scrollIntoView({ block: 'center' });
        }
        async function loadFile(path, name) {
            showPanel('loading');
            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error('Failed to load file');
                let text = await res.text();
                const mode = getMode(name);
                if (!mode) {
                    showPanel('info', 'Unsupported file type');
                    return;
                }
                // Try to pretty-print JSON
                if (mode === 'application/json') {
                    try { text = JSON.stringify(JSON.parse(text), null, 2); } catch { }
                }
                showPanel('editor');
                document.getElementById('file-name').textContent = name;
                document.getElementById('file-path').textContent = path;
                document.getElementById('file-icon').textContent = mode === 'application/json' ? '📄' : '📄';
                setBreadcrumbs(path);
                expandToPath(path);
                // File actions
                const actions = document.getElementById('file-actions');
                actions.innerHTML = '';
                const btnPath = document.createElement('button');
                btnPath.textContent = 'Copy Path';
                btnPath.onclick = () => { navigator.clipboard.writeText(path); };
                actions.appendChild(btnPath);
                const btnContent = document.createElement('button');
                btnContent.textContent = 'Copy Content';
                btnContent.onclick = () => { navigator.clipboard.writeText(text); };
                actions.appendChild(btnContent);
                // CodeMirror
                if (!cm) {
                    cm = CodeMirror(document.getElementById('cm-editor'), {
                        value: text,
                        mode: mode,
                        lineNumbers: true,
                        readOnly: isReadOnly,
                        theme: 'neo',
                    });
                } else {
                    cm.setValue(text);
                    cm.setOption('mode', mode);
                    cm.setOption('readOnly', isReadOnly);
                }
                cm.refresh && cm.refresh();
            } catch (err) {
                showPanel('error', err.message);
            }
        }
        document.getElementById('toggle-readonly').onclick = function () {
            isReadOnly = !isReadOnly;
            if (cm) cm.setOption('readOnly', isReadOnly);
            this.textContent = isReadOnly ? 'Read Only' : 'Editable';
            this.style.background = isReadOnly ? '#3498db' : '#27ae60';
        };
        function showPanel(type, msg) {
            document.getElementById('file-panel').style.display = type === 'editor' ? '' : 'none';
            document.getElementById('file-loading').style.display = type === 'loading' ? '' : 'none';
            document.getElementById('file-error').style.display = type === 'error' ? '' : 'none';
            document.getElementById('file-info').style.display = type === 'info' ? '' : 'none';
            if (type === 'error') document.getElementById('file-error').textContent = msg || 'Failed to load file';
            if (type === 'info') document.getElementById('file-info').textContent = msg || '';
        }
        // --- Init ---
        window.addEventListener('DOMContentLoaded', initTree);
    </script>
</body>

</html>
