<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localization Visualizer</title>
    <style>
        /* Use styles similar to role-action-visualizer.html for consistency */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .controls {
            padding: 20px;
            background: #ecf0f1;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .filter-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            min-width: 200px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-label {
            font-size: 12px;
            color: #7f8c8d;
        }

        .content {
            padding: 20px;
            max-height: 70vh;
            overflow: auto;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px 8px;
            text-align: left;
            vertical-align: top;
            font-size: 14px;
        }

        th {
            background: #34495e;
            color: white;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
            font-size: 14px;
        }

        th:hover {
            background: #2c3e50;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        tr:hover {
            background: #e3f2fd;
        }

        .locale-cell {
            font-weight: bold;
            color: #2c3e50;
            max-width: 250px;
            word-break: break-all;
            white-space: normal;
        }

        .module-cell {
            color: #7f8c8d;
        }

        .status-indicator {
            font-size: 18px;
            display: inline-block;
            margin-right: 4px;
        }

        .status-ok {
            color: #27ae60;
        }

        .status-missing {
            color: #e74c3c;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .error {
            color: #e74c3c;
            background: #fdf2f2;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #e74c3c;
        }

        .info {
            color: #27ae60;
            background: #f0f9f0;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #27ae60;
        }

        .add-btn {
            background: #27ae60;
            margin-right: 10px;
        }

        .add-btn:hover {
            background: #229954;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5em;
        }

        .close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            line-height: 1;
        }

        .close:hover {
            opacity: 0.7;
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        .snackbar {
            visibility: hidden;
            min-width: 250px;
            background-color: #323232;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            z-index: 9999;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .snackbar.show {
            visibility: visible;
            opacity: 1;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .login-card h2 {
            margin: 0 0 20px;
            color: #2c3e50;
            text-align: center;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-form input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .login-form button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .login-form button:hover {
            background: #2980b9;
        }

        .login-error {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Localization Visualizer</h1>
            <p>Manage and analyze localization strings across modules and languages</p>
        </div>
        <div class="controls">
            <button class="btn add-btn" onclick="openAddStringModal()">+ Add New String</button>
            <input type="text" class="filter-input" id="locale-filter" placeholder="Filter by Locale Code..."
                oninput="filterData()">
            <input type="text" class="filter-input" id="translation-filter" placeholder="Filter by Translation..."
                oninput="filterData()">
            <select class="filter-input" id="module-filter" multiple size="4" onchange="filterData()">
                <option value="">All Modules</option>
            </select>
            <select class="filter-input" id="status-filter" onchange="filterData()">
                <option value="">All Statuses</option>
                <option value="missing">Missing Translations</option>
                <option value="complete">Complete</option>
            </select>
        </div>
        <div class="content">
            <div id="error-container"></div>
            <div id="table-view">
                <div class="loading">Loading localization data...</div>
            </div>
        </div>
    </div>
    <!-- Add/Edit String Modal -->
    <div id="addStringModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Localization String</h2>
                <button class="close" onclick="closeAddStringModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addStringForm">
                    <div class="form-group">
                        <label for="locale-code-input">Locale Code</label>
                        <input type="text" id="locale-code-input" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="module-input">Module</label>
                        <select id="module-input" class="form-control" required></select>
                    </div>
                    <div class="form-group">
                        <label for="base-lang-input">Base Language (en)</label>
                        <input type="text" id="base-lang-input" class="form-control" required>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" onclick="closeAddStringModal()">Cancel</button>
                        <button type="submit" class="btn btn-success">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="snackbar" class="snackbar"></div>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2>Login</h2>
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="otp" placeholder="OTP" required>
                <button type="submit">Login</button>
            </form>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>
    <script>
        // === CONFIGURATION ===
        const API_BASE = '/api';
        const LOGIN_URL = `${API_BASE}/user/oauth/token`;
        const SEARCH_URL = `${API_BASE}/localization/messages/v1/_search`;
        const UPSERT_URL = `${API_BASE}/localization/messages/v1/_upsert`;
        const TENANT_ID = 'dj';
        const USER_TYPE = 'EMPLOYEE';
        const CLIENT_AUTH = 'Basic ZWdvdi11c2VyLWNsaWVudDo=';
        // === END CONFIGURATION ===

        const SUPPORTED_LANGUAGES = ['en', 'fr'];
        let MODULES = [];
        let localizationData = [];
        let filteredData = [];
        const accessToken = localStorage.getItem('egov_token');
        const userInfo = JSON.parse(localStorage.getItem('egov_userInfo') || 'null');
        if (!accessToken) {
            window.location.href = 'index.html';
        }
        let editingString = null;

        // Debounce map for each cell
        const debounceTimers = {};

        document.addEventListener('DOMContentLoaded', function () {
            checkStoredCredentials();
            // Fetch modules dynamically from StateInfo.json
            fetch('/data/dj/common-masters/StateInfo.json')
                .then(res => res.json())
                .then(data => {
                    MODULES = (data.StateInfo && data.StateInfo[0] && data.StateInfo[0].localizationModules)
                        ? data.StateInfo[0].localizationModules.map(m => m.value)
                        : [];
                    populateModuleDropdowns();
                    // Modal form submit
                    document.getElementById('addStringForm').onsubmit = function (e) {
                        e.preventDefault();
                        saveString();
                    };
                })
                .catch(err => {
                    showError('Failed to load modules from StateInfo.json');
                    MODULES = [];
                    populateModuleDropdowns();
                });
        });

        function populateModuleDropdowns() {
            const moduleFilter = document.getElementById('module-filter');
            const moduleInput = document.getElementById('module-input');
            moduleFilter.innerHTML = '<option value="">All Modules</option>';
            moduleInput.innerHTML = '';
            MODULES.forEach(m => {
                const opt1 = document.createElement('option');
                opt1.value = m; opt1.textContent = m;
                moduleFilter.appendChild(opt1);
                const opt2 = document.createElement('option');
                opt2.value = m; opt2.textContent = m;
                moduleInput.appendChild(opt2);
            });
        }

        async function loginAndLoad(username, otp) {
            showLoading();
            try {
                await ensureLogin();
                await loadLocalizationData();
            } catch (e) {
                if (e.message.includes('401') || e.message.includes('403')) {
                    localStorage.removeItem('egov_token');
                    localStorage.removeItem('egov_userInfo');
                    window.location.href = 'index.html';
                    return { messages: [] };
                } else {
                    showError('Login/API error: ' + e.message);
                }
                throw e;
            }
        }

        async function ensureLogin() {
            // No-op: token and userInfo are already in localStorage, just use them
            return;
        }

        async function loadLocalizationData() {
            showLoading();
            // Compose RequestInfo
            const requestInfo = {
                apiId: 'Rainmaker',
                authToken: accessToken,
                msgId: Date.now() + '|en_IN',
                plainAccessRequest: {},
                userInfo: userInfo
            };
            // Compose modules param
            const modulesParam = MODULES.join(',');
            // Fetch for all languages in parallel
            const langConfigs = SUPPORTED_LANGUAGES.map(lang => ({
                lang,
                locale: lang === 'en' ? 'en_IN' : (lang === 'fr' ? 'fr_FR_IN' : 'ar_AR_IN')
            }));
            const fetches = langConfigs.map(cfg =>
                fetch(`${SEARCH_URL}?module=${encodeURIComponent(modulesParam)}&locale=${cfg.locale}&tenantId=${TENANT_ID}&_=${Date.now()}`, {
                    method: 'POST',
                    headers: {
                        'accept': 'application/json, text/plain, */*',
                        'content-type': 'application/json;charset=UTF-8',
                    },
                    body: JSON.stringify({ RequestInfo: requestInfo })
                })
                    .then(r => {
                        if (r.status === 401 || r.status === 403) {
                            localStorage.removeItem('egov_token');
                            localStorage.removeItem('egov_userInfo');
                            window.location.href = 'index.html';
                            return { messages: [] };
                        }
                        return r.ok ? r.json() : { messages: [] };
                    })
                    .then(d => ({ lang: cfg.lang, messages: d.messages || [] }))
            );
            const allLangData = await Promise.all(fetches);
            const messagesByCode = {};
            allLangData.forEach(({ lang, messages }) => {
                messages.forEach(msg => {
                    if (!messagesByCode[msg.code]) {
                        messagesByCode[msg.code] = { code: msg.code, module: msg.module, translations: {} };
                    }
                    messagesByCode[msg.code].translations[lang] = msg.message;
                });
            });
            localizationData = Object.values(messagesByCode);
            filteredData = [...localizationData];
            renderTable();
        }

        async function saveString() {
            const code = document.getElementById('locale-code-input').value.trim();
            const module = document.getElementById('module-input').value;
            const en = document.getElementById('base-lang-input').value.trim();
            if (!code || !module || !en) { showError('All fields are required.'); return; }
            if (localizationData.some(item => item.code === code)) { showError('Locale code must be unique.'); return; }
            // Compose RequestInfo
            const requestInfo = {
                action: 'POST',
                authToken: accessToken,
                msgId: Date.now().toString(),
                userInfo: userInfo
            };
            // Compose message
            const payload = {
                RequestInfo: requestInfo,
                tenantId: TENANT_ID,
                messages: [
                    {
                        code,
                        message: en,
                        module,
                        locale: 'en_IN'
                    }
                ]
            };
            const res = await fetch(UPSERT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.status === 401 || res.status === 403) {
                localStorage.removeItem('egov_token');
                localStorage.removeItem('egov_userInfo');
                window.location.href = 'index.html';
                return;
            }
            if (!res.ok) { showError('Failed to add string'); return; }
            // Add to local data and refresh
            localizationData.unshift({ code, module, translations: { en, fr: '', ar: '' } });
            filterData();
            closeAddStringModal();
        }

        function renderTable() {
            const container = document.getElementById('table-view');
            if (filteredData.length === 0) {
                container.innerHTML = '<div class="loading">No localization strings to display</div>';
                return;
            }
            let html = '<div class="table-container"><table><colgroup>';
            html += '<col style="width:25%">'; // Locale Code
            html += '<col style="width:12.5%">'; // Module
            html += '<col style="width:25%">'; // EN
            html += '<col style="width:25%">'; // FR
            html += '</colgroup>';
            html += '<thead><tr>';
            html += '<th>Locale Code</th><th>Module</th>';
            SUPPORTED_LANGUAGES.forEach(lang => { html += `<th>${lang.toUpperCase()}</th>`; });
            SUPPORTED_LANGUAGES.filter(l => l !== 'en').forEach(lang => { html += `<th>Status (${lang})</th>`; });
            html += '</tr></thead><tbody>';
            filteredData.forEach((item, idx) => {
                html += `<tr>`;
                html += `<td class="locale-cell">${item.code}</td>`;
                html += `<td class="module-cell"><select onchange="editModule('${item.code}', this.value)">`;
                MODULES.forEach(m => {
                    html += `<option value="${m}"${item.module === m ? ' selected' : ''}>${m}</option>`;
                });
                html += `</select></td>`;
                SUPPORTED_LANGUAGES.forEach(lang => {
                    html += `<td contenteditable="true" oninput="debouncedEditTranslation('${item.code}','${lang}',this)" >${item.translations[lang] || ''}</td>`;
                });
                SUPPORTED_LANGUAGES.filter(l => l !== 'en').forEach(lang => {
                    const ok = item.translations[lang] && item.translations[lang].trim();
                    html += `<td><span class="status-indicator ${ok ? 'status-ok' : 'status-missing'}">${ok ? '✔️' : '❌'}</span></td>`;
                });
                html += `</tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // Debounce function for translation updates
        function debouncedEditTranslation(code, lang, el) {
            const key = code + '|' + lang;
            if (debounceTimers[key]) clearTimeout(debounceTimers[key]);
            debounceTimers[key] = setTimeout(() => {
                editTranslation(code, lang, el.textContent);
            }, 600);
        }

        async function editTranslation(code, lang, value) {
            const item = localizationData.find(i => i.code === code);
            if (!item) return;
            // Compose RequestInfo
            const requestInfo = {
                action: 'POST',
                authToken: accessToken,
                msgId: Date.now().toString(),
                userInfo: userInfo
            };
            // Compose message
            let locale;
            if (lang === 'en') locale = 'en_IN';
            else if (lang === 'fr') locale = 'fr_FR_IN';
            else locale = 'ar_AR_IN';
            const payload = {
                RequestInfo: requestInfo,
                tenantId: TENANT_ID,
                messages: [
                    {
                        code,
                        message: value,
                        module: item.module,
                        locale
                    }
                ]
            };
            const res = await fetch(UPSERT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.status === 401 || res.status === 403) {
                localStorage.removeItem('egov_token');
                localStorage.removeItem('egov_userInfo');
                window.location.href = 'index.html';
                return;
            }
            if (!res.ok) { showError('Failed to update translation'); return; }
            item.translations[lang] = value;
            renderTable();
            showSnackbar(`Updated "${code}" (${lang}): ${value}`);
        }

        // Edit module for a row
        async function editModule(code, newModule) {
            const item = localizationData.find(i => i.code === code);
            if (!item) return;
            // Compose RequestInfo
            const requestInfo = {
                action: 'POST',
                authToken: accessToken,
                msgId: Date.now().toString(),
                userInfo: userInfo
            };
            // For each language, make a separate API call
            try {
                for (const lang of SUPPORTED_LANGUAGES) {
                    let locale;
                    if (lang === 'en') locale = 'en_IN';
                    else if (lang === 'fr') locale = 'fr_FR_IN';
                    else locale = 'ar_AR_IN';
                    const payload = {
                        RequestInfo: requestInfo,
                        tenantId: TENANT_ID,
                        messages: [
                            {
                                code,
                                message: item.translations[lang] || '',
                                module: newModule,
                                locale
                            }
                        ]
                    };
                    const res = await fetch(UPSERT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (res.status === 401 || res.status === 403) {
                        localStorage.removeItem('egov_token');
                        localStorage.removeItem('egov_userInfo');
                        window.location.href = 'index.html';
                        return;
                    }
                    if (!res.ok) { showError('Failed to update module for ' + lang); return; }
                }
                item.module = newModule;
                renderTable();
                showSnackbar(`Module updated for "${code}"`);
            } catch (err) {
                showError('Failed to update module');
            }
        }

        // Levenshtein distance helper
        function levenshtein(a, b) {
            if (a === b) return 0;
            if (!a.length) return b.length;
            if (!b.length) return a.length;
            const v0 = Array(b.length + 1).fill(0);
            const v1 = Array(b.length + 1).fill(0);
            for (let i = 0; i <= b.length; i++) v0[i] = i;
            for (let i = 0; i < a.length; i++) {
                v1[0] = i + 1;
                for (let j = 0; j < b.length; j++) {
                    const cost = a[i] === b[j] ? 0 : 1;
                    v1[j + 1] = Math.min(v1[j] + 1, v0[j + 1] + 1, v0[j] + cost);
                }
                for (let j = 0; j <= b.length; j++) v0[j] = v1[j];
            }
            return v1[b.length];
        }

        function filterData() {
            const localeSearch = document.getElementById('locale-filter').value.trim().toLowerCase();
            const translationSearch = document.getElementById('translation-filter').value.trim().toLowerCase();
            const moduleSelect = document.getElementById('module-filter');
            const selectedModules = Array.from(moduleSelect.selectedOptions).map(opt => opt.value).filter(Boolean);
            const statusVal = document.getElementById('status-filter').value;
            let data = localizationData;
            // Locale code filter
            if (localeSearch) {
                const maxDist = Math.max(1, Math.floor(localeSearch.length / 3));
                // Get all codes within allowed distance
                let matches = data.map(item => ({
                    item,
                    dist: levenshtein(item.code.toLowerCase(), localeSearch)
                }))
                    .filter(obj => obj.dist <= maxDist)
                    .sort((a, b) => a.dist - b.dist);
                data = matches.map(obj => obj.item);
            }
            // Translation filter
            if (translationSearch) {
                let exact = data.filter(item => Object.values(item.translations).some(t => t && t.toLowerCase() === translationSearch));
                if (exact.length > 0) data = exact;
                else {
                    const maxDist = Math.max(1, Math.floor(translationSearch.length / 3));
                    data = data.filter(item => Object.values(item.translations).some(t => t && levenshtein(t.toLowerCase(), translationSearch) <= maxDist));
                }
            }
            // Module filter (multi-select)
            if (selectedModules.length > 0) {
                data = data.filter(item => selectedModules.includes(item.module));
            }
            // Status filter
            if (statusVal) {
                if (statusVal === 'missing') {
                    data = data.filter(item => SUPPORTED_LANGUAGES.filter(l => l !== 'en').some(lang => !item.translations[lang] || !item.translations[lang].trim()));
                } else if (statusVal === 'complete') {
                    data = data.filter(item => SUPPORTED_LANGUAGES.filter(l => l !== 'en').every(lang => item.translations[lang] && item.translations[lang].trim()));
                }
            }
            filteredData = data;
            renderTable();
        }

        function showSnackbar(msg) {
            const sb = document.getElementById('snackbar');
            sb.textContent = msg;
            sb.className = 'snackbar show';
            setTimeout(() => {
                sb.className = 'snackbar';
            }, 3000);
        }

        function openAddStringModal() {
            editingString = null;
            document.getElementById('modal-title').textContent = 'Add New Localization String';
            document.getElementById('locale-code-input').value = '';
            document.getElementById('module-input').value = '';
            document.getElementById('base-lang-input').value = '';
            document.getElementById('addStringModal').style.display = 'block';
        }

        function closeAddStringModal() {
            document.getElementById('addStringModal').style.display = 'none';
        }

        function showError(msg) {
            document.getElementById('error-container').innerHTML = `<div class="error">${msg}</div>`;
            setTimeout(() => { document.getElementById('error-container').innerHTML = ''; }, 3000);
        }

        function showLoading() {
            document.getElementById('table-view').innerHTML = '<div class="loading">Loading...</div>';
        }

        function deleteRow(idx) {
            const code = filteredData[idx].code;
            // Remove from both filteredData and localizationData
            filteredData.splice(idx, 1);
            const i = localizationData.findIndex(x => x.code === code);
            if (i !== -1) localizationData.splice(i, 1);
            renderTable();
        }

        function checkStoredCredentials() {
            const storedCredentials = JSON.parse(localStorage.getItem('egov_credentials') || 'null');
            if (storedCredentials) {
                document.getElementById('loginOverlay').style.display = 'none';
                loginAndLoad(storedCredentials.username, storedCredentials.otp);
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const otp = document.getElementById('otp').value;
            document.getElementById('loginError').textContent = '';

            try {
                await loginAndLoad(username, otp);
                // Store credentials only after successful login
                localStorage.setItem('egov_credentials', JSON.stringify({ username, otp }));
                document.getElementById('loginOverlay').style.display = 'none';
            } catch (error) {
                document.getElementById('loginError').textContent = error.message;
            }
        }

        function showLoginScreen(error = '') {
            document.getElementById('loginOverlay').style.display = 'flex';
            if (error) {
                document.getElementById('loginError').textContent = error;
            }
            // Clear stored credentials as they're no longer valid
            localStorage.removeItem('egov_credentials');
            accessToken = null;
            userInfo = null;
        }
    </script>
</body>

</html>
