<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role-Action Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .controls {
            padding: 20px;
            background: #ecf0f1;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .filter-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            min-width: 200px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-label {
            font-size: 12px;
            color: #7f8c8d;
        }

        .content {
            padding: 20px;
            max-height: 70vh;
            overflow: auto;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #34495e;
            color: white;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background-color 0.2s;
        }

        th:hover {
            background: #2c3e50;
        }

        th.sortable::after {
            content: "↕";
            position: absolute;
            right: 8px;
            opacity: 0.5;
        }

        th.sort-asc::after {
            content: "↑";
            opacity: 1;
        }

        th.sort-desc::after {
            content: "↓";
            opacity: 1;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        tr:hover {
            background: #e3f2fd;
        }

        .role-cell {
            font-weight: bold;
            color: #2c3e50;
            max-width: 200px;
        }

        .action-cell {
            max-width: 300px;
            word-wrap: break-word;
        }

        .url-cell {
            font-family: monospace;
            font-size: 12px;
            color: #7f8c8d;
            max-width: 400px;
            word-break: break-all;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .error {
            color: #e74c3c;
            background: #fdf2f2;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #e74c3c;
        }

        .info {
            color: #27ae60;
            background: #f0f9f0;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #27ae60;
        }

        .badge {
            background: #3498db;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-left: 5px;
        }

        .service-badge {
            background: #27ae60;
        }

        .disabled-badge {
            background: #95a5a6;
        }

        .view-toggle {
            display: flex;
            gap: 5px;
        }

        .view-btn {
            padding: 6px 12px;
            font-size: 12px;
        }

        .view-btn.active {
            background: #27ae60;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
        }

        .summary-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .summary-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .summary-item {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5em;
        }

        .close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            line-height: 1;
        }

        .close:hover {
            opacity: 0.7;
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        .add-mapping-btn {
            background: #27ae60;
            margin-right: 10px;
        }

        .add-mapping-btn:hover {
            background: #229954;
        }

        .download-btn {
            background: #f39c12;
            color: white;
        }

        .download-btn:hover {
            background: #e67e22;
        }

        .mapping-preview {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
        }

        .mapping-preview h4 {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        .preview-item {
            margin: 5px 0;
            font-family: monospace;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Role-Action Visualizer</h1>
            <p>Explore role-action mappings and permissions</p>
        </div>

        <div class="controls">
            <button class="btn" onclick="loadData()">Load Data</button>
            <button class="btn add-mapping-btn" onclick="openAddMappingModal()">Add New Mapping</button>
            <button class="btn download-btn" onclick="downloadUpdatedJSON()">Download JSON</button>
            <input type="text" class="filter-input" id="role-filter" placeholder="Filter by role..."
                oninput="filterData()">
            <input type="text" class="filter-input" id="action-filter" placeholder="Filter by action/ID/URL..."
                oninput="filterData()">
            <button class="btn" onclick="clearFilters()">Clear Filters</button>
            <div class="view-toggle">
                <button class="view-btn active" onclick="switchView('table')">Table View</button>
                <button class="view-btn" onclick="switchView('summary')">Summary View</button>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="total-roles">0</div>
                    <div class="stat-label">Roles</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-actions">0</div>
                    <div class="stat-label">Actions</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-mappings">0</div>
                    <div class="stat-label">Mappings</div>
                </div>
            </div>
        </div>

        <div class="content">
            <div id="error-container"></div>
            <div id="table-view">
                <div class="loading">Click "Load Data" to fetch role-action mappings...</div>
            </div>
            <div id="summary-view" style="display: none;">
                <div class="summary-grid">
                    <div class="summary-card">
                        <div class="summary-title">Roles by Action Count</div>
                        <div class="summary-list" id="roles-by-count"></div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-title">Most Used Actions</div>
                        <div class="summary-list" id="actions-by-usage"></div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-title">Service Distribution</div>
                        <div class="summary-list" id="service-distribution"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add New Mapping Modal -->
    <div id="addMappingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Role-Action Mapping</h2>
                <button class="close" onclick="closeAddMappingModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addMappingForm">
                    <div class="form-group">
                        <label for="role-select">Role:</label>
                        <select id="role-select" class="form-control" onchange="updateMappingPreview()">
                            <option value="">Select a role...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="action-select">Action:</label>
                        <select id="action-select" class="form-control" onchange="updateMappingPreview()">
                            <option value="">Select an action...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="tenant-input">Tenant ID:</label>
                        <input type="text" id="tenant-input" class="form-control" value="dj"
                            onchange="updateMappingPreview()">
                    </div>

                    <div class="mapping-preview" id="mapping-preview" style="display: none;">
                        <h4>Preview:</h4>
                        <div id="preview-content"></div>
                    </div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" onclick="closeAddMappingModal()">Cancel</button>
                        <button type="button" class="btn btn-success" onclick="addNewMapping()">Add Mapping</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let rawData = {
            roleActions: [],
            actions: [],
            roles: []
        };
        let processedData = [];
        let filteredData = [];
        let currentView = 'table';
        let hasUnsavedChanges = false;

        async function loadData() {
            try {
                showLoading();
                clearError();

                // Load all three JSON files
                const [roleActionsResponse, actionsResponse, rolesResponse] = await Promise.all([
                    fetch('../../data/dj/ACCESSCONTROL-ROLEACTIONS/roleactions.json'),
                    fetch('../../data/dj/ACCESSCONTROL-ACTIONS-TEST/actions-test.json'),
                    fetch('../../data/dj/ACCESSCONTROL-ROLES/roles.json')
                ]);

                if (!roleActionsResponse.ok || !actionsResponse.ok || !rolesResponse.ok) {
                    throw new Error('Failed to load one or more data files');
                }

                const [roleActionsData, actionsData, rolesData] = await Promise.all([
                    roleActionsResponse.json(),
                    actionsResponse.json(),
                    rolesResponse.json()
                ]);

                rawData.roleActions = roleActionsData.roleactions || [];
                rawData.actions = actionsData['actions-test'] || [];
                rawData.roles = rolesData.roles || [];

                processData();
                updateStats();
                renderCurrentView();

                showMessage('Data loaded successfully!', 'info');

            } catch (error) {
                showError('Error loading data: ' + error.message);
                console.error('Load error:', error);
            }
        }

        function processData() {
            // Create lookup maps for better performance
            const actionMap = new Map();
            rawData.actions.forEach(action => {
                actionMap.set(action.id, action);
            });

            const roleMap = new Map();
            rawData.roles.forEach(role => {
                roleMap.set(role.code, role);
            });

            // Process role-action mappings
            processedData = rawData.roleActions.map(mapping => {
                const action = actionMap.get(mapping.actionid) || {};
                const role = roleMap.get(mapping.rolecode) || {};

                return {
                    roleCode: mapping.rolecode,
                    roleName: role.name || mapping.rolecode,
                    roleDescription: role.description || '',
                    actionId: mapping.actionid,
                    actionName: action.name || 'Unknown Action',
                    actionUrl: action.url || '',
                    actionDisplayName: action.displayName || action.name || '',
                    serviceCode: action.serviceCode || '',
                    enabled: action.enabled !== undefined ? action.enabled : false,
                    tenantId: mapping.tenantId || mapping.tenantid || ''
                };
            });

            filteredData = [...processedData];
        }

        function updateStats() {
            const uniqueRoles = new Set(processedData.map(item => item.roleCode));
            const uniqueActions = new Set(processedData.map(item => item.actionId));

            document.getElementById('total-roles').textContent = uniqueRoles.size;
            document.getElementById('total-actions').textContent = uniqueActions.size;
            document.getElementById('total-mappings').textContent = processedData.length;
        }

        function renderCurrentView() {
            if (currentView === 'table') {
                renderTableView();
            } else {
                renderSummaryView();
            }
        }

        function renderTableView() {
            const container = document.getElementById('table-view');

            if (filteredData.length === 0) {
                container.innerHTML = '<div class="loading">No data to display</div>';
                return;
            }

            let html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th class="sortable" onclick="sortTable('roleCode')">Role</th>
                                <th class="sortable" onclick="sortTable('actionId')">Action ID</th>
                                <th class="sortable" onclick="sortTable('actionName')">Action</th>
                                <th class="sortable" onclick="sortTable('actionUrl')">URL</th>
                                <th class="sortable" onclick="sortTable('serviceCode')">Service</th>
                                <th class="sortable" onclick="sortTable('enabled')">Status</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            filteredData.forEach(item => {
                html += `
                    <tr>
                        <td class="role-cell">
                            <strong>${item.roleCode}</strong><br>
                            <small>${item.roleName}</small>
                            ${item.roleDescription ? `<br><em style="color: #7f8c8d;">${item.roleDescription}</em>` : ''}
                        </td>
                        <td class="action-cell">
                            <span class="badge">${item.actionId}</span>
                        </td>
                        <td class="action-cell">
                            <strong>${item.actionDisplayName || item.actionName}</strong><br>
                            <small style="color: #7f8c8d;">${item.actionName}</small>
                        </td>
                        <td class="url-cell">${item.actionUrl}</td>
                        <td>
                            ${item.serviceCode ? `<span class="badge service-badge">${item.serviceCode}</span>` : '-'}
                        </td>
                        <td>
                            <span class="badge ${item.enabled ? '' : 'disabled-badge'}">
                                ${item.enabled ? 'Enabled' : 'Disabled'}
                            </span>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        function renderSummaryView() {
            // Roles by action count
            const roleActionCounts = new Map();
            processedData.forEach(item => {
                const count = roleActionCounts.get(item.roleCode) || 0;
                roleActionCounts.set(item.roleCode, count + 1);
            });

            const sortedRoles = Array.from(roleActionCounts.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 15);

            document.getElementById('roles-by-count').innerHTML = sortedRoles
                .map(([role, count]) => `
                    <div class="summary-item">
                        <span>${role}</span>
                        <span class="badge">${count}</span>
                    </div>
                `).join('');

            // Most used actions
            const actionUsageCounts = new Map();
            processedData.forEach(item => {
                const count = actionUsageCounts.get(item.actionId) || 0;
                actionUsageCounts.set(item.actionId, count + 1);
            });

            const sortedActions = Array.from(actionUsageCounts.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 15);

            document.getElementById('actions-by-usage').innerHTML = sortedActions
                .map(([actionId, count]) => {
                    const action = processedData.find(item => item.actionId == actionId);
                    return `
                        <div class="summary-item">
                            <span>${action ? (action.actionDisplayName || action.actionName) : actionId}</span>
                            <span class="badge">${count}</span>
                        </div>
                    `;
                }).join('');

            // Service distribution
            const serviceCounts = new Map();
            processedData.forEach(item => {
                if (item.serviceCode) {
                    const count = serviceCounts.get(item.serviceCode) || 0;
                    serviceCounts.set(item.serviceCode, count + 1);
                }
            });

            const sortedServices = Array.from(serviceCounts.entries())
                .sort((a, b) => b[1] - a[1]);

            document.getElementById('service-distribution').innerHTML = sortedServices
                .map(([service, count]) => `
                    <div class="summary-item">
                        <span>${service}</span>
                        <span class="badge service-badge">${count}</span>
                    </div>
                `).join('');
        }

        function filterData() {
            const roleFilter = document.getElementById('role-filter').value.toLowerCase();
            const actionFilter = document.getElementById('action-filter').value.toLowerCase();

            filteredData = processedData.filter(item => {
                const roleMatch = !roleFilter ||
                    item.roleCode.toLowerCase().includes(roleFilter) ||
                    item.roleName.toLowerCase().includes(roleFilter);

                const actionMatch = !actionFilter ||
                    item.actionName.toLowerCase().includes(actionFilter) ||
                    item.actionDisplayName.toLowerCase().includes(actionFilter) ||
                    item.actionUrl.toLowerCase().includes(actionFilter) ||
                    item.actionId.toString().toLowerCase().includes(actionFilter);

                return roleMatch && actionMatch;
            });

            renderCurrentView();
        }

        function switchView(view) {
            currentView = view;

            // Update button states
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Show/hide views
            document.getElementById('table-view').style.display = view === 'table' ? 'block' : 'none';
            document.getElementById('summary-view').style.display = view === 'summary' ? 'block' : 'none';

            renderCurrentView();
        }

        function showLoading() {
            document.getElementById('table-view').innerHTML = '<div class="loading">Loading data...</div>';
        }

        function showError(message) {
            document.getElementById('error-container').innerHTML = `<div class="error">${message}</div>`;
        }

        function showMessage(message, type = 'info') {
            const className = type === 'error' ? 'error' : 'info';
            document.getElementById('error-container').innerHTML = `<div class="${className}">${message}</div>`;
            setTimeout(() => {
                document.getElementById('error-container').innerHTML = '';
            }, 3000);
        }

        function clearError() {
            document.getElementById('error-container').innerHTML = '';
        }

        function clearFilters() {
            document.getElementById('role-filter').value = '';
            document.getElementById('action-filter').value = '';
            filteredData = [...processedData];
            renderCurrentView();
        }

        let sortDirection = {};

        function sortTable(column) {
            // Toggle sort direction
            sortDirection[column] = sortDirection[column] === 'asc' ? 'desc' : 'asc';

            // Remove existing sort classes
            document.querySelectorAll('th').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
            });

            // Add sort class to current column
            const clickedHeader = event.target;
            clickedHeader.classList.add(sortDirection[column] === 'asc' ? 'sort-asc' : 'sort-desc');

            // Sort the data
            filteredData.sort((a, b) => {
                let aVal = a[column];
                let bVal = b[column];

                // Handle different data types
                if (typeof aVal === 'string') {
                    aVal = aVal.toLowerCase();
                    bVal = bVal.toLowerCase();
                } else if (typeof aVal === 'number') {
                    aVal = Number(aVal) || 0;
                    bVal = Number(bVal) || 0;
                } else if (typeof aVal === 'boolean') {
                    aVal = aVal ? 1 : 0;
                    bVal = bVal ? 1 : 0;
                }

                if (sortDirection[column] === 'asc') {
                    return aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                } else {
                    return aVal > bVal ? -1 : aVal < bVal ? 1 : 0;
                }
            });

            renderCurrentView();
        }

        // Modal Functions
        function openAddMappingModal() {
            if (rawData.roles.length === 0 || rawData.actions.length === 0) {
                showError('Please load data first before adding mappings.');
                return;
            }

            populateDropdowns();
            document.getElementById('addMappingModal').style.display = 'block';
        }

        function closeAddMappingModal() {
            document.getElementById('addMappingModal').style.display = 'none';
            document.getElementById('addMappingForm').reset();
            document.getElementById('mapping-preview').style.display = 'none';
            document.getElementById('tenant-input').value = 'dj';
        }

        function populateDropdowns() {
            const roleSelect = document.getElementById('role-select');
            const actionSelect = document.getElementById('action-select');

            // Clear existing options
            roleSelect.innerHTML = '<option value="">Select a role...</option>';
            actionSelect.innerHTML = '<option value="">Select an action...</option>';

            // Populate roles
            rawData.roles.forEach(role => {
                const option = document.createElement('option');
                option.value = role.code;
                option.textContent = `${role.code} - ${role.name}`;
                roleSelect.appendChild(option);
            });

            // Populate actions
            rawData.actions.forEach(action => {
                const option = document.createElement('option');
                option.value = action.id;
                option.textContent = `${action.id} - ${action.displayName || action.name}`;
                actionSelect.appendChild(option);
            });
        }

        function updateMappingPreview() {
            const roleCode = document.getElementById('role-select').value;
            const actionId = document.getElementById('action-select').value;
            const tenantId = document.getElementById('tenant-input').value;

            if (roleCode && actionId && tenantId) {
                const role = rawData.roles.find(r => r.code === roleCode);
                const action = rawData.actions.find(a => a.id == actionId);

                const previewDiv = document.getElementById('mapping-preview');
                const contentDiv = document.getElementById('preview-content');

                contentDiv.innerHTML = `
                    <div class="preview-item"><strong>Role:</strong> ${roleCode} (${role ? role.name : 'Unknown'})</div>
                    <div class="preview-item"><strong>Action ID:</strong> ${actionId}</div>
                    <div class="preview-item"><strong>Action:</strong> ${action ? action.displayName || action.name : 'Unknown'}</div>
                    <div class="preview-item"><strong>Tenant ID:</strong> ${tenantId}</div>
                    <div class="preview-item"><strong>JSON:</strong> { "rolecode": "${roleCode}", "actionid": ${actionId}, "tenantId": "${tenantId}" }</div>
                `;

                previewDiv.style.display = 'block';
            } else {
                document.getElementById('mapping-preview').style.display = 'none';
            }
        }

        function addNewMapping() {
            const roleCode = document.getElementById('role-select').value;
            const actionId = parseInt(document.getElementById('action-select').value);
            const tenantId = document.getElementById('tenant-input').value;

            if (!roleCode || !actionId || !tenantId) {
                showError('Please fill in all fields.');
                return;
            }

            // Check if mapping already exists
            const existingMapping = rawData.roleActions.find(mapping =>
                mapping.rolecode === roleCode && mapping.actionid === actionId
            );

            if (existingMapping) {
                showError('This role-action mapping already exists.');
                return;
            }

            // Create new mapping
            const newMapping = {
                rolecode: roleCode,
                actionid: actionId,
                actioncode: "",
                tenantId: tenantId
            };

            // Add to raw data
            rawData.roleActions.push(newMapping);

            // Reprocess data
            processData();
            updateStats();
            renderCurrentView();

            // Set unsaved changes flag
            hasUnsavedChanges = true;
            updateDownloadButton();

            closeAddMappingModal();
            showMessage(`Successfully added mapping: ${roleCode} → Action ${actionId}`, 'info');
        }

        function downloadUpdatedJSON() {
            if (!hasUnsavedChanges) {
                showError('No changes to download. Add some mappings first.');
                return;
            }

            const updatedData = {
                tenantId: "dj",
                moduleName: "ACCESSCONTROL-ROLEACTIONS",
                roleactions: rawData.roleActions
            };

            const dataStr = JSON.stringify(updatedData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });

            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = 'roleactions-updated.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showMessage('Updated roleactions.json downloaded successfully!', 'info');
        }

        function updateDownloadButton() {
            const downloadBtn = document.querySelector('.download-btn');
            if (hasUnsavedChanges) {
                downloadBtn.textContent = 'Download JSON (*)';
                downloadBtn.style.background = '#e67e22';
            } else {
                downloadBtn.textContent = 'Download JSON';
                downloadBtn.style.background = '#f39c12';
            }
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('addMappingModal');
            if (event.target === modal) {
                closeAddMappingModal();
            }
        }

        // Auto-load data when page loads
        document.addEventListener('DOMContentLoaded', function () {
            loadData();
        });
    </script>
</body>

</html>
